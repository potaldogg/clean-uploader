<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Uploader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Container utama */
        .container {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card utama */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #eaeaea;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header .badge {
            font-size: 12px;
            color: #86868b;
            font-weight: 400;
        }

        .header .divider {
            width: 32px;
            height: 2px;
            background: #d4d4d4;
            margin: 16px auto 0;
        }

        /* Dropzone */
        .dropzone {
            border: 1.5px dashed #c6c6c8;
            border-radius: 20px;
            padding: 48px 24px;
            text-align: center;
            background: #fbfbfd;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dropzone:hover {
            border-color: #1a1a1a;
            background: #f5f5f7;
        }

        .dropzone.drag-over {
            border-color: #1a1a1a;
            background: #f5f5f7;
        }

        .dropzone-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .dropzone-text {
            font-size: 16px;
            font-weight: 450;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .dropzone-hint {
            font-size: 13px;
            color: #86868b;
        }

        /* File info */
        .file-info {
            margin-top: 20px;
            padding: 14px 18px;
            background: #f5f5f7;
            border-radius: 14px;
            font-size: 14px;
            color: #1a1a1a;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-info-icon {
            font-size: 20px;
        }

        .file-info-details {
            flex: 1;
        }

        .file-info-name {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .file-info-size {
            font-size: 12px;
            color: #86868b;
        }

        /* Button */
        .patch-btn {
            width: 100%;
            padding: 14px 20px;
            margin-top: 24px;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .patch-btn:hover:not(:disabled) {
            background: #333333;
            transform: scale(0.98);
        }

        .patch-btn:disabled {
            background: #e5e5ea;
            color: #8e8e93;
            cursor: not-allowed;
        }

        /* Status */
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .status-info {
            background: #f5f5f7;
            color: #1a1a1a;
        }

        .status-success {
            background: #f0fdf4;
            color: #166534;
        }

        .status-error {
            background: #fef2f2;
            color: #991b1b;
        }

        /* Footer links - text only, minimal */
        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
        }

        .footer-links a {
            color: #8e8e93;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s ease;
            letter-spacing: 0.2px;
        }

        .footer-links a:hover {
            color: #1a1a1a;
        }

        .footer-links .separator {
            color: #d4d4d4;
            font-size: 11px;
        }

        /* Credit line */
        .credit {
            margin-top: 28px;
            text-align: center;
            font-size: 11px;
            color: #b0b0b5;
        }

        /* Hidden input */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Clean Uploader</h1>
                <div class="badge">by <a href="https://www.tiktok.com/@0x0g0ds" target="_blank" rel="noopener noreferrer">potaldogg</a></div>
                <div class="divider"></div>
            </div>

            <!-- Dropzone -->
            <div class="dropzone" id="dropzone">
                <div class="dropzone-icon">⌘</div>
                <div class="dropzone-text">drop video here</div>
                <div class="dropzone-hint">MP4 or MOV · click to browse</div>
            </div>
            <input type="file" id="fileInput" accept=".mp4,.mov">

            <!-- File info (hidden initially) -->
            <div id="fileInfo" style="display: none;" class="file-info">
                <div class="file-info-icon">📹</div>
                <div class="file-info-details">
                    <div class="file-info-name" id="fileName"></div>
                    <div class="file-info-size" id="fileSize"></div>
                </div>
            </div>

            <!-- Patch button -->
            <button class="patch-btn" id="patchBtn" disabled>patch video</button>

            <!-- Status message -->
            <div id="status" class="status status-info" style="display: none;"></div>
        </div>

        <!-- Social links - text only, minimal -->
        <div class="footer-links">
            <a href="https://www.tiktok.com/@0x0g0ds" target="_blank" rel="noopener noreferrer">tiktok</a>
            <span class="separator">/</span>
            <a href="https://www.instagram.com/potaldogg" target="_blank" rel="noopener noreferrer">instagram</a>
            <span class="separator">/</span>
            <a href="https://github.com/potaldogg" target="_blank" rel="noopener noreferrer">github</a>
        </div>
        <div class="credit">
            patch payload 0x10000001 · tiktok studio ready
        </div>
    </div>

    <script>
        const PAYLOAD = 268435457; // 0x10000001
        let selectedFile = null;

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const patchBtn = document.getElementById('patchBtn');
        const statusEl = document.getElementById('status');
        const fileInfoDiv = document.getElementById('fileInfo');
        const fileNameSpan = document.getElementById('fileName');
        const fileSizeSpan = document.getElementById('fileSize');

        function showStatus(message, type = 'info') {
            statusEl.textContent = message;
            statusEl.className = `status status-${type}`;
            statusEl.style.display = 'block';
        }

        function hideStatus() {
            statusEl.style.display = 'none';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(1) + ' KB';
            }
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function handleFile(file) {
            if (!file) return;
            
            if (!file.name.toLowerCase().endsWith('.mp4') && !file.name.toLowerCase().endsWith('.mov')) {
                showStatus('❌ format tidak didukung · gunakan .mp4 atau .mov', 'error');
                selectedFile = null;
                fileInfoDiv.style.display = 'none';
                patchBtn.disabled = true;
                return;
            }

            selectedFile = file;
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            const sizeText = formatFileSize(file.size);
            
            fileNameSpan.textContent = file.name;
            fileSizeSpan.textContent = sizeText;
            fileInfoDiv.style.display = 'flex';
            
            showStatus(`✓ file siap dipatch · ${sizeMB} MB`, 'success');
            patchBtn.disabled = false;
        }

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('drag-over');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-over');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        async function patchVideo(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const buffer = e.target.result;
                        const data = new Uint8Array(buffer);
                        
                        // Cari atom 'elst' (0x65,0x6C,0x73,0x74)
                        const elstMagic = [0x65, 0x6C, 0x73, 0x74];
                        let elstIndex = -1;
                        for (let i = 0; i < data.length - 4; i++) {
                            if (data[i] === elstMagic[0] && 
                                data[i+1] === elstMagic[1] &&
                                data[i+2] === elstMagic[2] && 
                                data[i+3] === elstMagic[3]) {
                                elstIndex = i;
                                break;
                            }
                        }
                        
                        if (elstIndex === -1) {
                            reject(new Error('atom "elst" tidak ditemukan · pastikan file MP4/MOV valid'));
                            return;
                        }
                        
                        // Tulis payload di offset +8 (big-endian)
                        const offset = elstIndex + 8;
                        data[offset] = (PAYLOAD >> 24) & 0xFF;
                        data[offset+1] = (PAYLOAD >> 16) & 0xFF;
                        data[offset+2] = (PAYLOAD >> 8) & 0xFF;
                        data[offset+3] = PAYLOAD & 0xFF;
                        
                        resolve(data.buffer);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error('gagal membaca file'));
                reader.readAsArrayBuffer(file);
            });
        }

        patchBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            patchBtn.disabled = true;
            patchBtn.textContent = 'memproses...';
            showStatus('🔍 mencari atom elst & menyuntikkan payload...', 'info');
            
            try {
                const patchedBuffer = await patchVideo(selectedFile);
                const blob = new Blob([patchedBuffer], { type: selectedFile.type || 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // Preserve original extension
                const originalName = selectedFile.name.replace(/\.[^/.]+$/, '');
                const ext = selectedFile.name.split('.').pop();
                a.download = `${originalName}_clean.${ext}`;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showStatus('✓ selesai · video sudah di-patch dan di-download · upload ke tiktok studio', 'success');
            } catch (err) {
                showStatus('✗ ' + err.message, 'error');
            } finally {
                patchBtn.disabled = false;
                patchBtn.textContent = 'patch video';
            }
        });
    </script>
</body>
</html>
